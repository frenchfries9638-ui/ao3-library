<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>번역 서재</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f0e0c;
      --bg2: #181614;
      --border: #272420;
      --gold: #c9a96e;
      --text: #e2d9c8;
      --text2: #9a8a74;
      --text3: #5a5040;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', Georgia, serif; min-height: 100vh; }
    ::selection { background: #5a4a30; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 4px; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 18px; color: var(--gold); letter-spacing: 0.02em; }
    .header-actions { display: flex; gap: 8px; }

    /* BUTTONS */
    .btn { font-family: inherit; cursor: pointer; border: none; border-radius: 6px; font-size: 14px; transition: opacity 0.15s; }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: var(--gold); color: #0f0e0c; padding: 8px 16px; font-weight: 600; }
    .btn-ghost { background: var(--bg2); color: var(--text2); padding: 8px 14px; border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: #a05040; padding: 8px 14px; border: 1px solid #3a2820; }
    .btn-icon { background: none; color: var(--text2); padding: 8px; font-size: 18px; }

    /* VIEWS */
    .view { display: none; }
    .view.active { display: block; }

    /* LIST VIEW */
    .list-wrap { padding: 16px; }
    .search-bar {
      width: 100%; padding: 10px 14px; margin-bottom: 16px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 14px;
      border-radius: 8px; outline: none;
    }
    .search-bar::placeholder { color: var(--text3); }
    .search-bar:focus { border-color: #4a3f2f; }

    .entry-list { display: flex; flex-direction: column; gap: 1px; }
    .entry-item {
      background: var(--bg2); padding: 16px;
      cursor: pointer; transition: background 0.1s;
      border-radius: 0;
    }
    .entry-item:first-child { border-radius: 8px 8px 0 0; }
    .entry-item:last-child { border-radius: 0 0 8px 8px; }
    .entry-item:only-child { border-radius: 8px; }
    .entry-item:active { background: #201e1a; }
    .entry-title { font-size: 15px; color: var(--text); margin-bottom: 3px; line-height: 1.4; }
    .entry-work { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .entry-meta { display: flex; justify-content: space-between; align-items: center; }
    .entry-preview { font-size: 12px; color: var(--text3); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; margin-right: 12px; }
    .entry-date { font-size: 11px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }

    .empty {
      text-align: center; padding: 80px 20px;
      color: var(--text3); font-size: 14px; line-height: 2;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

    /* READ VIEW */
    .read-wrap { max-width: 640px; margin: 0 auto; padding: 24px 20px 80px; }
    .read-work { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .read-title { font-size: 22px; line-height: 1.4; color: var(--text); margin-bottom: 10px; }
    .read-meta { font-size: 12px; color: var(--text3); margin-bottom: 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .read-meta a { color: #5a7a9a; text-decoration: none; }
    .read-divider { height: 1px; background: var(--border); margin-bottom: 28px; }
    .prose { font-size: 16px; line-height: 2; color: #cfc5b0; }
    .prose p { margin-bottom: 1.4em; }

    /* SETTINGS */
    .settings-wrap { padding: 24px 20px; max-width: 500px; }
    .settings-section { margin-bottom: 28px; }
    .settings-label { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .settings-input {
      width: 100%; padding: 12px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 14px;
      border-radius: 8px; outline: none;
    }
    .settings-input:focus { border-color: #4a3f2f; }
    .settings-hint { font-size: 12px; color: var(--text3); margin-top: 8px; line-height: 1.7; }
    .settings-hint a { color: var(--gold); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #2a3820; border: 1px solid #3a5a24; color: #8ac86a;
      padding: 10px 20px; border-radius: 20px; font-size: 13px;
      white-space: nowrap; z-index: 999;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="logo">서재</div>
  <div class="header-actions" id="header-actions"></div>
</header>

<main>
  <!-- LIST -->
  <div class="view active" id="view-list">
    <div class="list-wrap">
      <input class="search-bar" id="search" placeholder="검색…" oninput="renderList()" />
      <div id="entry-list"></div>
    </div>
  </div>

  <!-- READ -->
  <div class="view" id="view-read">
    <div class="read-wrap">
      <div class="read-work" id="read-work"></div>
      <div class="read-title" id="read-title"></div>
      <div class="read-meta" id="read-meta"></div>
      <div class="read-divider"></div>
      <div class="prose" id="read-prose"></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="view-settings">
    <div class="settings-wrap">
      <div class="settings-section">
        <div class="settings-label">단축어 안내</div>
        <div class="settings-hint" style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;line-height:1.8;">
          콜로모에서 번역 완료 후<br />
          공유 → <strong style="color:var(--text2)">📚 서재에 저장</strong> 탭하면<br />
          자동으로 여기에 저장돼요
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">데이터</div>
        <button class="btn btn-danger" onclick="clearAll()" style="width:100%;padding:12px;border-radius:8px;">전체 삭제</button>
      </div>
    </div>
  </div>
</main>

<script>
const STORAGE_KEY = 'ao3-library-v1';
let state = { entries: [] };
let currentId = null;
let currentView = 'list';

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) state = JSON.parse(r); } catch(_) {}
}
function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_) {}
}
function generateId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function formatDate(iso) {
  return new Date(iso).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
}

// ── VIEWS ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  currentView = name;
  renderHeader();
  window.scrollTo(0, 0);
  if (name === 'list') renderList();
}

function renderHeader() {
  const el = document.getElementById('header-actions');
  if (currentView === 'list') {
    el.innerHTML = `<button class="btn btn-icon" onclick="showView('settings')" title="설정">⚙️</button>`;
  } else if (currentView === 'read') {
    el.innerHTML = `
      <button class="btn btn-ghost" onclick="showView('list')">목록</button>
      <button class="btn btn-danger" onclick="deleteCurrent()">삭제</button>
    `;
  } else if (currentView === 'settings') {
    el.innerHTML = `<button class="btn btn-ghost" onclick="showView('list')">완료</button>`;
  }
}

// ── LIST ──
function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const filtered = state.entries.filter(e =>
    !q || e.title.toLowerCase().includes(q) || (e.workTitle||'').toLowerCase().includes(q)
  );
  const el = document.getElementById('entry-list');

  if (state.entries.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div>저장된 번역이 없어요<br>콜로모에서 번역 후 단축어로 저장해보세요</div>`;
    return;
  }
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>검색 결과가 없어요</div>`;
    return;
  }

  el.innerHTML = `<div class="entry-list">${filtered.map(e => `
    <div class="entry-item" onclick='openEntry(${JSON.stringify(e).replace(/'/g,"&#39;")})'>
      <div class="entry-title">${e.title}</div>
      ${e.workTitle ? `<div class="entry-work">『${e.workTitle}』</div>` : ''}
      <div class="entry-meta">
        <div class="entry-preview">${e.content.slice(0, 50)}</div>
        <div class="entry-date">${formatDate(e.updatedAt)}</div>
      </div>
    </div>
  `).join('')}</div>`;
}

// ── READ ──
function openEntry(entry) {
  currentId = entry.id;
  document.getElementById('read-work').textContent = entry.workTitle ? `『${entry.workTitle}』` : '';
  document.getElementById('read-title').textContent = entry.title;

  let meta = `<span>${formatDate(entry.createdAt)}</span><span>·</span><span>${entry.content.trim().length.toLocaleString()}자</span>`;
  if (entry.sourceUrl) meta += `<a href="${entry.sourceUrl}" target="_blank">원문 →</a>`;
  document.getElementById('read-meta').innerHTML = meta;

  document.getElementById('read-prose').innerHTML =
    entry.content.split(/\n+/).filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');

  showView('read');
}

function deleteCurrent() {
  if (!confirm('삭제할까요?')) return;
  state.entries = state.entries.filter(e => e.id !== currentId);
  persist();
  showView('list');
}

function clearAll() {
  if (!confirm('모든 번역을 삭제할까요?')) return;
  state.entries = [];
  persist();
  showView('list');
}

// ── IMPORT ──
function saveEntry(data) {
  if (!data.content || data.content.length < 10) return;
  const already = state.entries.some(e => e.createdAt === data.createdAt && e.sourceUrl === data.sourceUrl);
  if (already) { showToast('이미 저장된 번역이에요'); return; }
  const entry = {
    id: generateId(),
    title: data.title || '번역',
    workTitle: data.workTitle || '',
    sourceUrl: data.sourceUrl || '',
    content: data.content,
    createdAt: data.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  state.entries.unshift(entry);
  persist();
  showToast('✓ 저장됐어요');
  openEntry(entry);
}

function checkImport() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('import');
  if (!raw) return;
  history.replaceState({}, '', location.pathname);
  try { saveEntry(JSON.parse(decodeURIComponent(raw))); } catch(_) {}
}

async function checkClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text || text.length < 50) return;
    const data = JSON.parse(text);
    if (!data.content || data.content.length < 50) return;
    const already = state.entries.some(e => e.createdAt === data.createdAt);
    if (already) return;
    await navigator.clipboard.writeText('');
    saveEntry(data);
  } catch(_) {}
}

// ── TOAST ──
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── INIT ──
load();
renderHeader();
renderList();
checkImport();
checkClipboard();
</script>
</body>
</html>
