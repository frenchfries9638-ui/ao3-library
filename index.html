<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>서재</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body.theme-light { --bg:#f2f2f7; --bg-card:#fff; --bg-nav:rgba(242,242,247,0.9); --label:#000; --label2:rgba(60,60,67,0.6); --label3:rgba(60,60,67,0.3); --tint:#007aff; --destructive:#ff3b30; --fill:rgba(120,120,128,0.12); --separator:rgba(60,60,67,0.12); --prose:#1a1a1a; }
    body.theme-dark  { --bg:#000; --bg-card:#1c1c1e; --bg-nav:rgba(0,0,0,0.9); --label:#fff; --label2:rgba(235,235,245,0.6); --label3:rgba(235,235,245,0.3); --tint:#0a84ff; --destructive:#ff453a; --fill:rgba(118,118,128,0.24); --separator:rgba(84,84,88,0.6); --prose:#e8e8e8; }
    body.theme-sepia { --bg:#f4efe6; --bg-card:#ede6d8; --bg-nav:rgba(244,239,230,0.9); --label:#3b2f1e; --label2:rgba(59,47,30,0.6); --label3:rgba(59,47,30,0.3); --tint:#8b5e3c; --destructive:#c0392b; --fill:rgba(139,94,60,0.12); --separator:rgba(59,47,30,0.12); --prose:#3b2f1e; }

    html,body { min-height:100%; }
    body { background:var(--bg); color:var(--label); font-family:-apple-system,'Noto Serif KR',sans-serif; padding-bottom:env(safe-area-inset-bottom); transition:background .2s,color .2s; }
    ::selection { background:rgba(0,122,255,0.2); }

    .navbar { position:sticky; top:0; z-index:100; background:var(--bg-nav); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border-bottom:.5px solid var(--separator); padding:0 16px; padding-top:env(safe-area-inset-top); }
    .navbar-inner { height:44px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .navbar-title { font-size:15px; font-weight:600; color:var(--label); font-family:-apple-system,sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; text-align:center; }
    .navbar-btn { background:none; border:none; color:var(--tint); font-size:17px; cursor:pointer; padding:4px 2px; font-family:-apple-system,sans-serif; white-space:nowrap; flex-shrink:0; }
    .navbar-btn:active { opacity:.5; }
    .navbar-large { font-size:34px; font-weight:700; color:var(--label); padding:4px 16px 12px; font-family:-apple-system,sans-serif; letter-spacing:-.5px; }

    .search-wrap { padding:0 16px 10px; }
    .search-box { position:relative; }
    .search-bar { width:100%; background:var(--fill); border:none; border-radius:10px; padding:8px 12px 8px 34px; font-size:17px; color:var(--label); font-family:-apple-system,sans-serif; outline:none; }
    .search-bar::placeholder { color:var(--label3); }
    .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--label3); font-size:15px; pointer-events:none; }

    .view { display:none; }
    .view.active { display:block; }

    /* LIST */
    .tag-filter { padding:0 16px 10px; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .tag-filter::-webkit-scrollbar { display:none; }
    .tag-chip { display:inline-flex; align-items:center; gap:4px; background:var(--fill); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--label2); font-family:-apple-system,sans-serif; cursor:pointer; white-space:nowrap; border:none; }
    .tag-chip.active { background:var(--tint); color:#fff; }
    .tag-chip.del::after { content:'×'; margin-left:2px; }
    .section { margin:0 16px 24px; }
    .section-hd { font-size:13px; color:var(--label2); font-family:-apple-system,sans-serif; padding:0 4px 6px; text-transform:uppercase; letter-spacing:.04em; }
    .list-group { background:var(--bg-card); border-radius:12px; overflow:hidden; }
    .list-item { padding:12px 16px; cursor:pointer; border-bottom:.5px solid var(--separator); display:flex; align-items:center; gap:12px; }
    .list-item:last-child { border-bottom:none; }
    .list-item:active { background:var(--fill); }
    .item-body { flex:1; min-width:0; }
    .item-title { font-size:17px; color:var(--label); margin-bottom:2px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.3; }
    .item-sub { font-size:13px; color:var(--label2); font-family:-apple-system,sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
    .item-tag { background:var(--fill); border-radius:20px; padding:2px 8px; font-size:11px; color:var(--label2); font-family:-apple-system,sans-serif; }
    .item-right { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .item-date { font-size:13px; color:var(--label3); font-family:-apple-system,sans-serif; }
    .chevron { color:var(--label3); font-size:13px; }
    .empty { text-align:center; padding:80px 20px; }
    .empty-icon { font-size:48px; margin-bottom:12px; }
    .empty-title { font-size:20px; font-weight:600; color:var(--label); margin-bottom:8px; font-family:-apple-system,sans-serif; }
    .empty-desc { font-size:15px; color:var(--label2); line-height:1.6; font-family:-apple-system,sans-serif; }

    /* READ */
    .read-hd { padding:16px 20px 0; }
    .read-work { font-size:13px; color:var(--label2); margin-bottom:4px; font-family:-apple-system,sans-serif; }
    .read-title { font-size:24px; font-weight:700; line-height:1.3; color:var(--label); margin-bottom:8px; letter-spacing:-.3px; }
    .read-meta { font-size:13px; color:var(--label2); font-family:-apple-system,sans-serif; display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
    .read-meta a { color:var(--tint); text-decoration:none; }
    .read-meta button { background:none; border:none; color:var(--tint); font-size:13px; cursor:pointer; padding:0; font-family:-apple-system,sans-serif; }
    .read-tags { display:flex; flex-wrap:wrap; gap:6px; padding:0 20px 16px; }
    .read-divider { height:.5px; background:var(--separator); margin:0 20px 24px; }
    .prose { padding:0 20px 140px; color:var(--prose); font-family:'Noto Serif KR',Georgia,serif; }
    .prose p { margin-bottom:1.3em; }
    .prose .en { color:var(--label2); font-style:italic; font-size:.9em; }
    .prose.hide-en .en { display:none; }
    .prose.hide-ko .ko { display:none; }

    /* LOADING */
    .read-loading { display:flex; align-items:center; justify-content:center; padding:80px 20px; gap:12px; color:var(--label2); font-family:-apple-system,sans-serif; }

    /* TOOLBAR */
    .reader-toolbar { position:fixed; bottom:0; left:0; right:0; background:var(--bg-nav); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border-top:.5px solid var(--separator); padding:10px 16px; padding-bottom:calc(10px + env(safe-area-inset-bottom)); display:none; flex-direction:column; gap:10px; z-index:50; }
    .reader-toolbar.on { display:flex; }
    .tb-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .tb-btn { background:var(--fill); border:none; color:var(--label); padding:8px 14px; border-radius:8px; font-size:15px; cursor:pointer; font-family:-apple-system,sans-serif; flex:1; text-align:center; }
    .tb-btn:active { opacity:.6; }
    .tb-btn.on { background:var(--tint); color:#fff; }
    .tb-label { font-size:12px; color:var(--label3); font-family:-apple-system,sans-serif; text-align:center; min-width:44px; }
    .theme-dot { width:28px; height:28px; border-radius:50%; cursor:pointer; flex-shrink:0; border:2px solid transparent; }
    .theme-dot.on { border-color:var(--tint); }
    .tag-inp-wrap { display:flex; gap:8px; width:100%; }
    .tag-inp { flex:1; background:var(--fill); border:none; border-radius:8px; padding:8px 12px; font-size:15px; color:var(--label); font-family:-apple-system,sans-serif; outline:none; }
    .tag-inp::placeholder { color:var(--label3); }
    .tag-add { background:var(--tint); border:none; border-radius:8px; padding:8px 14px; color:#fff; font-size:15px; cursor:pointer; font-family:-apple-system,sans-serif; }
    .tb-tags { display:flex; flex-wrap:wrap; gap:6px; }

    /* SETTINGS */
    .settings-body { padding:20px 0; }
    .settings-sec { margin:0 16px 28px; }
    .settings-lbl { font-size:13px; color:var(--label2); font-family:-apple-system,sans-serif; text-transform:uppercase; letter-spacing:.04em; padding:0 4px 6px; }
    .settings-group { background:var(--bg-card); border-radius:12px; overflow:hidden; }
    .settings-row { padding:14px 16px; border-bottom:.5px solid var(--separator); font-family:-apple-system,sans-serif; }
    .settings-row:last-child { border-bottom:none; }
    .settings-row-lbl { font-size:17px; color:var(--label); margin-bottom:6px; }
    .settings-inp { width:100%; background:transparent; border:none; font-size:15px; color:var(--label2); font-family:-apple-system,sans-serif; outline:none; padding:0; }
    .settings-inp::placeholder { color:var(--label3); }
    .settings-hint { font-size:13px; color:var(--label2); line-height:1.7; padding:0 4px; margin-top:6px; }
    .btn-del { width:100%; padding:14px; background:var(--bg-card); border:none; border-radius:12px; color:var(--destructive); font-size:17px; font-family:-apple-system,sans-serif; cursor:pointer; }
    .btn-del:active { opacity:.5; }

    .loading { display:flex; align-items:center; justify-content:center; padding:40px; gap:10px; color:var(--label2); font-family:-apple-system,sans-serif; font-size:15px; }
    .spinner { width:20px; height:20px; border:2px solid var(--separator); border-top-color:var(--tint); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(50,50,50,0.92); color:#fff; padding:10px 20px; border-radius:20px; font-size:14px; white-space:nowrap; z-index:999; font-family:-apple-system,sans-serif; animation:fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  </style>
</head>
<body class="theme-light">

<!-- LIST -->
<div class="view active" id="view-list">
  <div class="navbar">
    <div class="navbar-inner">
      <span></span><span class="navbar-title">서재</span>
      <button class="navbar-btn" onclick="showView('settings')">설정</button>
    </div>
  </div>
  <div class="navbar-large">서재</div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-bar" id="search" placeholder="검색" oninput="renderList()" />
    </div>
  </div>
  <div class="tag-filter" id="tag-filter"></div>
  <div id="list-body"></div>
</div>

<!-- READ -->
<div class="view" id="view-read">
  <div class="navbar">
    <div class="navbar-inner">
      <button class="navbar-btn" onclick="exitRead()">‹ 서재</button>
      <span class="navbar-title" id="read-nav-title"></span>
      <button class="navbar-btn" onclick="toggleToolbar()">가✦</button>
    </div>
  </div>
  <div class="read-hd">
    <div class="read-work" id="read-work"></div>
    <div class="read-title" id="read-title"></div>
    <div class="read-meta" id="read-meta"></div>
  </div>
  <div class="read-tags" id="read-tags"></div>
  <div class="read-divider"></div>
  <div id="read-prose-wrap"></div>
</div>

<!-- TOOLBAR -->
<div class="reader-toolbar" id="reader-toolbar">
  <div class="tb-row">
    <button class="tb-btn" style="flex:0;padding:8px 16px;font-size:13px" onclick="chgFont(-1)">가−</button>
    <span class="tb-label" id="font-lbl">17px</span>
    <button class="tb-btn" style="flex:0;padding:8px 16px;font-size:19px" onclick="chgFont(1)">가+</button>
  </div>
  <div class="tb-row">
    <span style="font-size:12px;color:var(--label3);font-family:-apple-system,sans-serif;flex-shrink:0">자간</span>
    <button class="tb-btn" style="flex:0;padding:8px 16px" onclick="chgLine(-1)">↕−</button>
    <span class="tb-label" id="line-lbl">1.9</span>
    <button class="tb-btn" style="flex:0;padding:8px 16px" onclick="chgLine(1)">↕+</button>
  </div>
  <div class="tb-row">
    <button class="tb-btn" id="mode-ko" onclick="setMode('ko')">한국어만</button>
    <button class="tb-btn" id="mode-both" onclick="setMode('both')">둘 다</button>
    <button class="tb-btn" id="mode-en" onclick="setMode('en')">영어만</button>
  </div>
  <div class="tb-row">
    <div class="tag-inp-wrap">
      <input class="tag-inp" id="tag-inp" placeholder="태그 추가…" onkeydown="if(event.key==='Enter')addTag()" />
      <button class="tag-add" onclick="addTag()">추가</button>
    </div>
  </div>
  <div class="tb-tags" id="tb-tags"></div>
  <div class="tb-row" style="justify-content:center;gap:14px">
    <button class="theme-dot" id="td-light" style="background:#f2f2f7;border-color:#ddd" onclick="setTheme('light')"></button>
    <button class="theme-dot" id="td-sepia" style="background:#f4efe6;border-color:#c8b89a" onclick="setTheme('sepia')"></button>
    <button class="theme-dot" id="td-dark"  style="background:#1c1c1e" onclick="setTheme('dark')"></button>
    <button class="tb-btn" style="flex:0;padding:6px 12px;font-size:13px;color:var(--destructive)" onclick="deleteCurrent()">삭제</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="view" id="view-settings">
  <div class="navbar">
    <div class="navbar-inner">
      <span></span><span class="navbar-title">설정</span>
      <button class="navbar-btn" onclick="saveSettings()">완료</button>
    </div>
  </div>
  <div class="settings-body">
    <div class="settings-sec">
      <div class="settings-lbl">GitHub 연동</div>
      <div class="settings-group">
        <div class="settings-row">
          <div class="settings-row-lbl">Personal Access Token</div>
          <input class="settings-inp" id="inp-token" type="password" placeholder="ghp_..." />
        </div>
      </div>
      <div class="settings-hint">github.com → Settings → Developer settings →<br>Personal access tokens → Tokens (classic) →<br>Generate new token → <strong>repo</strong> 체크 후 생성</div>
    </div>
    <div class="settings-sec">
      <div class="settings-lbl">단축어 사용법</div>
      <div class="settings-group">
        <div class="settings-row">
          <div class="settings-hint" style="margin:0">콜로모에서 번역 완료 후<br>공유(□↑) → <strong>📚 서재에 저장</strong> 탭하면<br>자동으로 저장돼요</div>
        </div>
      </div>
    </div>
    <div class="settings-sec">
      <button class="btn-del" onclick="clearAll()">전체 삭제</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const OWNER = 'frenchfries9638-ui';
const REPO  = 'ao3-library';
const GH    = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
const RAW   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main`;

// ── STATE ──
let token = '';
let index = [];        // [{id, title, workTitle, sourceUrl, tags, createdAt, updatedAt}]
let indexSha = null;
let currentMeta = null;
let activeTag = null;
let prefs = { fontSize:17, lineHeight:1.9, mode:'ko', theme:'light' };

// ── GITHUB HELPERS ──
function ghHeaders(extra={}) {
  return { Authorization:`token ${token}`, ...extra };
}

async function ghReadFile(path) {
  const res = await fetch(`${GH}/${path}`, { headers: ghHeaders() });
  if (res.status === 404) return { data: null, sha: null };
  if (!res.ok) throw new Error('GitHub 연결 실패');
  const j = await res.json();
  return { data: j, sha: j.sha };
}

async function ghWriteFile(path, content, sha, msg='update') {
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const body = { message: msg, content: encoded };
  if (sha) body.sha = sha;
  const res = await fetch(`${GH}/${path}`, {
    method: 'PUT',
    headers: ghHeaders({ 'Content-Type':'application/json' }),
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || '저장 실패');
  }
  const j = await res.json();
  return j.content.sha;
}

async function ghReadRaw(path) {
  const res = await fetch(`${RAW}/${path}?t=${Date.now()}`);
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('불러오기 실패');
  return await res.json();
}

// ── INDEX (목록만) ──
async function loadIndex() {
  const el = document.getElementById('list-body');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>불러오는 중…</div>`;
  try {
    if (!token) throw new Error('no-token');
    const { data } = await ghReadFile('data/index.json');
    if (data) {
      indexSha = data.sha;
      index = await ghReadRaw('data/index.json') || [];
    } else {
      index = [];
    }
    renderList();
  } catch(err) {
    el.innerHTML = err.message === 'no-token'
      ? `<div class="empty"><div class="empty-icon">🔑</div><div class="empty-title">토큰 설정 필요</div><div class="empty-desc">설정에서 GitHub 토큰을 입력해주세요</div></div>`
      : `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">불러오기 실패</div><div class="empty-desc">${err.message}</div></div>`;
  }
}

async function saveIndex() {
  indexSha = await ghWriteFile('data/index.json', JSON.stringify(index), indexSha, 'update index');
}

// ── CONTENT (본문) ──
async function loadContent(id) {
  const wrap = document.getElementById('read-prose-wrap');
  wrap.innerHTML = `<div class="read-loading"><div class="spinner"></div>불러오는 중…</div>`;
  try {
    const data = await ghReadRaw(`data/${id}.json`);
    if (!data) throw new Error('본문 없음');
    renderProse(data.content);
  } catch(err) {
    wrap.innerHTML = `<div class="read-loading">불러오기 실패: ${err.message}</div>`;
  }
}

async function saveContent(id, content, sha) {
  return await ghWriteFile(`data/${id}.json`, JSON.stringify({content}), sha, 'save content');
}

// ── RENDER ──
function renderProse(content) {
  const wrap = document.getElementById('read-prose-wrap');
  const paragraphs = content.split(/\n+/).filter(p => p.trim());
  const prose = document.createElement('div');
  prose.className = 'prose';
  prose.id = 'read-prose';
  prose.innerHTML = paragraphs.map(p => {
    const cls = /[\uAC00-\uD7A3]/.test(p) ? 'ko' : 'en';
    return `<p class="${cls}">${p}</p>`;
  }).join('');
  wrap.innerHTML = '';
  wrap.appendChild(prose);
  applyPrefs();
  restoreScrollPos();
}

function getAllTags() {
  const s = new Set();
  index.forEach(e => (e.tags||[]).forEach(t => s.add(t)));
  return [...s].sort();
}

function renderTagFilter() {
  const el = document.getElementById('tag-filter');
  const tags = getAllTags();
  if (!tags.length) { el.innerHTML=''; return; }
  el.innerHTML = [
    `<button class="tag-chip ${!activeTag?'active':''}" onclick="setActiveTag(null)">전체</button>`,
    ...tags.map(t=>`<button class="tag-chip ${activeTag===t?'active':''}" onclick="setActiveTag('${t}')">${t}</button>`)
  ].join('');
}

function setActiveTag(t) { activeTag=t; renderTagFilter(); renderList(); }

function fmtDate(iso) {
  const d=new Date(iso), now=new Date(), diff=(now-d)/1000;
  if(diff<60) return '방금';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  if(diff<604800) return Math.floor(diff/86400)+'일 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}

function renderList() {
  renderTagFilter();
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const filtered = index.filter(e=>{
    const mq = !q || e.title.toLowerCase().includes(q) || (e.workTitle||'').toLowerCase().includes(q);
    const mt = !activeTag || (e.tags||[]).includes(activeTag);
    return mq && mt;
  });
  const el = document.getElementById('list-body');
  if(!el) return;

  if(index.length===0){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📚</div><div class="empty-title">서재가 비어있어요</div><div class="empty-desc">콜로모에서 번역 후<br>단축어로 저장해보세요</div></div>`;
    return;
  }
  if(filtered.length===0){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">검색 결과 없음</div></div>`;
    return;
  }

  const groups={};
  filtered.forEach(e=>{
    const diff=(new Date()-new Date(e.updatedAt))/86400000;
    const g=diff<1?'오늘':diff<7?'이번 주':diff<30?'이번 달':'이전';
    if(!groups[g]) groups[g]=[];
    groups[g].push(e);
  });

  el.innerHTML=['오늘','이번 주','이번 달','이전'].filter(g=>groups[g]).map(g=>`
    <div class="section">
      <div class="section-hd">${g}</div>
      <div class="list-group">
        ${groups[g].map(e=>`
          <div class="list-item" onclick='openEntry(${JSON.stringify(e).replace(/'/g,"&#39;")})'>
            <div class="item-body">
              <div class="item-title">${e.title}</div>
              <div class="item-sub">${e.workTitle?`『${e.workTitle}』`:''}</div>
              ${(e.tags||[]).length?`<div class="item-tags">${(e.tags||[]).map(t=>`<span class="item-tag">${t}</span>`).join('')}</div>`:''}
            </div>
            <div class="item-right">
              <div class="item-date">${fmtDate(e.updatedAt)}</div>
              <div class="chevron">›</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ── OPEN ENTRY ──
function openEntry(meta) {
  currentMeta = meta;
  document.getElementById('read-nav-title').textContent = meta.title;
  document.getElementById('read-work').textContent = meta.workTitle ? `『${meta.workTitle}』` : '';
  document.getElementById('read-title').textContent = meta.title;

  let m = `<span>${new Date(meta.createdAt).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}</span>`;
  if(meta.sourceUrl) {
    m += `<a href="${meta.sourceUrl}" target="_blank">원문 보기</a>`;
    m += `<button onclick="copyUrl('${meta.sourceUrl}')">링크 복사</button>`;
  }
  document.getElementById('read-meta').innerHTML = m;

  const tags = meta.tags||[];
  document.getElementById('read-tags').innerHTML = tags.map(t=>`<button class="tag-chip" onclick="setActiveTag('${t}');exitRead()">${t}</button>`).join('');
  renderTbTags(tags);

  showView('read');
  loadContent(meta.id);
  restoreScrollPos();
  window.addEventListener('scroll', saveScrollPos);
}

function copyUrl(url) {
  navigator.clipboard.writeText(url)
    .then(()=>showToast('링크 복사됐어요'))
    .catch(()=>{
      const el=document.createElement('textarea');
      el.value=url; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      showToast('링크 복사됐어요');
    });
}

function exitRead() {
  saveScrollPos();
  window.removeEventListener('scroll', saveScrollPos);
  hideToolbar();
  currentMeta = null;
  showView('list');
}

async function deleteCurrent() {
  if(!confirm('이 번역을 삭제할까요?')) return;
  const id = currentMeta.id;
  index = index.filter(e=>e.id!==id);
  try {
    await saveIndex();
    // 본문 파일 삭제
    const { sha } = await ghReadFile(`data/${id}.json`);
    if(sha) await fetch(`${GH}/data/${id}.json`, {
      method:'DELETE',
      headers: ghHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({ message:'delete entry', sha }),
    });
    showToast('삭제됐어요');
  } catch(_) { showToast('삭제 실패'); }
  exitRead();
}

async function clearAll() {
  if(!confirm('모든 번역을 삭제할까요?')) return;
  // 모든 본문 파일 삭제
  for(const e of index) {
    try {
      const { sha } = await ghReadFile(`data/${e.id}.json`);
      if(sha) await fetch(`${GH}/data/${e.id}.json`,{
        method:'DELETE',
        headers:ghHeaders({'Content-Type':'application/json'}),
        body:JSON.stringify({message:'delete',sha}),
      });
    } catch(_){}
  }
  index=[];
  try { await saveIndex(); } catch(_){}
  showView('list');
}

// ── TAGS ──
function renderTbTags(tags) {
  document.getElementById('tb-tags').innerHTML = tags.map(t=>`<button class="tag-chip del" onclick="removeTag('${t}')">${t}</button>`).join('');
}

async function addTag() {
  const inp = document.getElementById('tag-inp');
  const val = inp.value.trim();
  if(!val || !currentMeta) return;
  inp.value='';
  if(!currentMeta.tags) currentMeta.tags=[];
  if(currentMeta.tags.includes(val)) return;
  currentMeta.tags.push(val);
  const i = index.findIndex(e=>e.id===currentMeta.id);
  if(i>=0) index[i]=currentMeta;
  renderTbTags(currentMeta.tags);
  document.getElementById('read-tags').innerHTML = currentMeta.tags.map(t=>`<button class="tag-chip" onclick="setActiveTag('${t}');exitRead()">${t}</button>`).join('');
  try { await saveIndex(); showToast('태그 저장됨'); } catch(_){ showToast('저장 실패'); }
}

async function removeTag(tag) {
  if(!currentMeta) return;
  currentMeta.tags=(currentMeta.tags||[]).filter(t=>t!==tag);
  const i=index.findIndex(e=>e.id===currentMeta.id);
  if(i>=0) index[i]=currentMeta;
  renderTbTags(currentMeta.tags);
  document.getElementById('read-tags').innerHTML = currentMeta.tags.map(t=>`<button class="tag-chip" onclick="setActiveTag('${t}');exitRead()">${t}</button>`).join('');
  try { await saveIndex(); showToast('태그 삭제됨'); } catch(_){}
}

// ── PREFS ──
function loadPrefs() {
  try { const p=localStorage.getItem('reader-prefs'); if(p) prefs={...prefs,...JSON.parse(p)}; } catch(_){}
  applyPrefs();
}
function savePrefs() { localStorage.setItem('reader-prefs',JSON.stringify(prefs)); }
function applyPrefs() {
  const prose=document.getElementById('read-prose');
  if(prose){
    prose.style.fontSize=prefs.fontSize+'px';
    prose.style.lineHeight=prefs.lineHeight;
    prose.classList.remove('hide-en','hide-ko');
    if(prefs.mode==='ko') prose.classList.add('hide-en');
    if(prefs.mode==='en') prose.classList.add('hide-ko');
  }
  document.getElementById('font-lbl').textContent=prefs.fontSize+'px';
  document.getElementById('line-lbl').textContent=prefs.lineHeight.toFixed(1);
  ['ko','both','en'].forEach(m=>document.getElementById('mode-'+m)?.classList.toggle('on',prefs.mode===m));
  setTheme(prefs.theme,false);
}
function chgFont(d){ prefs.fontSize=Math.max(13,Math.min(24,prefs.fontSize+d)); savePrefs();applyPrefs(); }
function chgLine(d){ prefs.lineHeight=Math.round((Math.max(1.4,Math.min(2.8,prefs.lineHeight+d*.1)))*10)/10; savePrefs();applyPrefs(); }
function setMode(m){ prefs.mode=m; savePrefs();applyPrefs(); }
function setTheme(t,sv=true){
  prefs.theme=t; document.body.className='theme-'+t;
  ['light','sepia','dark'].forEach(x=>document.getElementById('td-'+x)?.classList.toggle('on',x===t));
  if(sv) savePrefs();
}

// ── TOOLBAR ──
let tbOn=false;
function toggleToolbar(){ tbOn=!tbOn; document.getElementById('reader-toolbar').classList.toggle('on',tbOn); }
function hideToolbar(){ tbOn=false; document.getElementById('reader-toolbar').classList.remove('on'); }

// ── SCROLL ──
function saveScrollPos(){ if(currentMeta) localStorage.setItem('scroll-'+currentMeta.id,window.scrollY); }
function restoreScrollPos(){ if(!currentMeta) return; const p=localStorage.getItem('scroll-'+currentMeta.id); if(p) setTimeout(()=>window.scrollTo(0,parseInt(p)),150); }

// ── VIEWS ──
function showView(n){
  if(n!=='read') hideToolbar();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');
  window.scrollTo(0,0);
  if(n==='list') renderList();
}

// ── SETTINGS ──
function loadSettings(){
  token=localStorage.getItem('gh-token')||'';
  if(token) document.getElementById('inp-token').value=token;
  loadPrefs();
}
function saveSettings(){
  token=document.getElementById('inp-token').value.trim();
  localStorage.setItem('gh-token',token);
  showView('list'); loadIndex();
}

// ── IMPORT FROM SHORTCUT ──
async function checkImport(){
  const params=new URLSearchParams(location.search);
  const raw=params.get('data');
  if(!raw) return;
  history.replaceState({},'',location.pathname);
  try {
    const data=JSON.parse(decodeURIComponent(raw));
    if(!data.content||data.content.length<10) return;
    showToast('저장 중…');

    // index 로드
    const { data: idxFile } = await ghReadFile('data/index.json');
    if(idxFile){ indexSha=idxFile.sha; index=await ghReadRaw('data/index.json')||[]; }

    const already=index.some(e=>e.createdAt===data.createdAt);
    if(already){ showToast('이미 저장된 번역이에요'); renderList(); return; }

    const id=Math.random().toString(36).slice(2)+Date.now().toString(36);
    const meta={ id, title:data.title||'번역', workTitle:data.workTitle||'', sourceUrl:data.sourceUrl||'', tags:[], createdAt:data.createdAt||new Date().toISOString(), updatedAt:new Date().toISOString() };

    // 본문 저장
    await saveContent(id, data.content, null);
    // index 업데이트
    index.unshift(meta);
    await saveIndex();

    showToast('저장됐어요!');
    openEntry(meta);
  } catch(e){
    showToast('저장 실패: '+e.message);
    renderList();
  }
}

// ── TOAST ──
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ── INIT ──
loadSettings();
loadIndex();
checkImport();
</script>
